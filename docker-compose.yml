services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: lavalink
    restart: unless-stopped
    environment:
      - LAVALINK_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - ./lavalink/application.yml:/opt/Lavalink/application.yml:ro
      - lavalink_plugins:/opt/Lavalink/plugins
    networks:
      - bot-network
    expose:
      - "2333"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -H \"Authorization: $$LAVALINK_PASSWORD\" http://localhost:2333/version || wget -q --header=\"Authorization: $$LAVALINK_PASSWORD\" -O- http://localhost:2333/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ssj-bot:
    build: .
    image: ssj-bot:latest
    container_name: ssj-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: America/Santiago
    depends_on:
      lavalink:
        condition: service_healthy
    networks:
      - bot-network
    tty: false
    stdin_open: false
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bot-network:
    driver: bridge

volumes:
  lavalink_plugins:
